version: "3.1"

stories:

  # ── Greeting flows ─────────────────────────────

  - story: greet then ask for help
    steps:
      - intent: greet
      - action: utter_greet
      - intent: help
      - action: utter_help

  - story: greet then ask how to book
    steps:
      - intent: greet
      - action: utter_greet
      - intent: ask_how_to_book
      - action: utter_ask_how_to_book
      - intent: thank_you
      - action: utter_thank_you

  - story: greet then check availability (live)
    steps:
      - intent: greet
      - action: utter_greet
      - intent: check_availability
      - action: action_check_availability

  # ── Live booking journey ─────────────────────

  - story: vehicle options then booking then payment
    steps:
      - intent: request_vehicle_options
      - action: action_fetch_vehicle_options
      - intent: ask_how_to_book
      - action: utter_ask_how_to_book
      - intent: ask_payment_methods
      - action: utter_ask_payment_methods

  - story: availability then price estimate (live)
    steps:
      - intent: check_availability
      - action: action_check_availability
      - intent: ask_price_estimate
      - action: action_fetch_price_estimate

  - story: pricing then payment methods
    steps:
      - intent: ask_price_estimate
      - action: action_fetch_price_estimate
      - intent: ask_payment_methods
      - action: utter_ask_payment_methods

  - story: pricing then affirm leads to payment methods
    steps:
      - intent: ask_price_estimate
      - action: action_fetch_price_estimate
      - intent: affirm
      - action: utter_ask_payment_methods

  - story: pricing model then booking
    steps:
      - intent: ask_pricing_model
      - action: utter_ask_pricing_model
      - intent: ask_how_to_book
      - action: utter_ask_how_to_book

  - story: pricing model then affirm leads to live prices
    steps:
      - intent: ask_pricing_model
      - action: utter_ask_pricing_model
      - intent: affirm
      - action: action_fetch_price_estimate

  - story: how to book then affirm leads to live pricing
    steps:
      - intent: ask_how_to_book
      - action: utter_ask_how_to_book
      - intent: affirm
      - action: action_check_availability

  - story: vehicle options then affirm leads to live pricing
    steps:
      - intent: request_vehicle_options
      - action: action_fetch_vehicle_options
      - intent: affirm
      - action: action_fetch_price_estimate

  - story: payment methods then affirm leads to refund policy
    steps:
      - intent: ask_payment_methods
      - action: utter_ask_payment_methods
      - intent: affirm
      - action: utter_ask_refund_policy

  - story: login issue then affirm leads to contact support
    steps:
      - intent: login_issue
      - action: utter_login_issue
      - intent: affirm
      - action: utter_contact_support

