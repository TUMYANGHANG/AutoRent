      - intent: contact_support
      - action: utter_contact_support

  - story: report issue then support
    steps:
      - intent: report_issue
      - action: utter_report_issue
      - intent: contact_support
      - action: utter_contact_support

  - story: login issue then password reset
    steps:
      - intent: login_issue
      - action: utter_login_issue
