  - story: greet then check booking status
    steps:
      - intent: greet
      - action: utter_greet
      - intent: ask_booking_status
      - action: action_fetch_booking_status

  - story: booking status then contact support
    steps:
      - intent: ask_booking_status
      - action: action_fetch_booking_status
